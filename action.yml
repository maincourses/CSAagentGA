name: "CSAagent Defect Scan"
description: "Run CSAagent on a repository and emit JSON/HTML reports."
author: "maincourses"

inputs:
  src-dir:
    description: "Source directory to scan."
    required: false
    default: "."
  config:
    description: "Path to config yaml. Empty means built-in CI config."
    required: false
    default: ""
  compile-commands:
    description: "Path to compile_commands.json (optional)."
    required: false
    default: ""
  output-dir:
    description: "Directory for generated reports."
    required: false
    default: "data/reports"
  output-format:
    description: "Formats separated by spaces or commas, e.g. 'json html'."
    required: false
    default: "json html"
  fail-on:
    description: "Fail policy: never|true_positive|uncertain|analyzer_failure|true_positive_or_uncertain|any_issue"
    required: false
    default: "never"
  fail-confidence:
    description: "Minimum confidence for fail policy checks."
    required: false
    default: "0.0"
  api-key:
    description: "LLM API key value. Exposed to config via API_KEY env."
    required: false
    default: ""

outputs:
  json-report:
    description: "Path to latest JSON report file."
    value: ${{ steps.run.outputs.json-report }}
  html-report:
    description: "Path to latest HTML report file."
    value: ${{ steps.run.outputs.html-report }}
  summary-json:
    description: "Path to machine-readable summary JSON."
    value: ${{ steps.run.outputs.summary-json }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      shell: powershell
      run: |
        $ErrorActionPreference = 'Stop'
        python -m pip install --upgrade pip
        python -m pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Run CSAagent
      id: run
      shell: powershell
      env:
        API_KEY: ${{ inputs.api-key }}
      run: |
        $ErrorActionPreference = 'Stop'

        $srcDir = "${{ inputs.src-dir }}"
        $outDir = "${{ inputs.output-dir }}"
        $summaryFile = Join-Path $outDir "csa_summary.json"

        $configInput = "${{ inputs.config }}"
        if ([string]::IsNullOrWhiteSpace($configInput)) {
          $configPath = "${{ github.action_path }}/configs/config.ci.yaml"
        } else {
          $configPath = $configInput
        }

        New-Item -ItemType Directory -Force -Path $outDir | Out-Null

        $formatsRaw = "${{ inputs.output-format }}" -replace ',', ' '
        $formats = $formatsRaw -split '\s+' | Where-Object { $_ -ne '' }

        $args = @(
          "${{ github.action_path }}/main.py", $srcDir,
          "--config", $configPath,
          "--output-dir", $outDir,
          "--summary-json", $summaryFile,
          "--ci",
          "--fail-on", "${{ inputs.fail-on }}",
          "--fail-confidence", "${{ inputs.fail-confidence }}"
        )

        $compileCommands = "${{ inputs.compile-commands }}"
        if (-not [string]::IsNullOrWhiteSpace($compileCommands)) {
          $args += @("--compile-commands", $compileCommands)
        }

        if ($formats.Count -gt 0) {
          $args += @("--output-format")
          $args += $formats
        }

        & python @args

        $jsonReport = Get-ChildItem -Path $outDir -Filter "report_*.json" -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1 -ExpandProperty FullName
        if ($null -eq $jsonReport) { $jsonReport = "" }

        $htmlReport = Get-ChildItem -Path $outDir -Filter "report_*.html" -ErrorAction SilentlyContinue |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1 -ExpandProperty FullName
        if ($null -eq $htmlReport) { $htmlReport = "" }

        Add-Content -Path $env:GITHUB_OUTPUT -Value "json-report=$jsonReport"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "html-report=$htmlReport"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "summary-json=$summaryFile"
