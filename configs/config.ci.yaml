# Default CI config for GitHub Actions runners.
# Override by passing action input `config` with your own file.

tools:
  clang_sa: "clang"
  clang_sa_checkers: []
  libclang_path: ""

llm:
  provider: "claude"
  model: "claude-sonnet-4-6"
  api_key_env: "API_KEY"
  api_base: "https://api.ccode.vip"
  temperature: 0.0
  max_tokens: 8192
  timeout: 120

  max_retries: 10
  retry_base_delay: 3
  retry_max_delay: 120

agent:
  max_steps: 12
  confidence_threshold: 0.7

analysis:
  compile_args: ["-std=c++20"]
  clang_sa_extra_args: []
  file_extensions: [".cpp", ".cc", ".cxx", ".c", ".h", ".hpp", ".hxx"]
  skip_dirs: ["build", "out", "dist", "third_party", ".git", ".ind_build", "download"]

report:
  output_dir: "data/reports"
  formats: ["json", "sarif"]
